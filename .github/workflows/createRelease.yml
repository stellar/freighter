name: Create Release
on:
  workflow_dispatch:
    inputs:
      appVersion:
        description: Version to bump to (e.g., "5.39.0")
        required: true
      branch:
        description: Branch or tag to release from
        default: "master"
        required: false
permissions:
  contents: write
  pull-requests: write
jobs:
  create-release:
    name: Create Release Branch and PRs
    runs-on: ubuntu-latest
    steps:
      # Step 1: Create release branch
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create and push release branch
        run: |
          git checkout -b release/${{ github.event.inputs.appVersion }}
          git push origin release/${{ github.event.inputs.appVersion }}

      # Step 2: Version branch + PR against release
      - name: Create version branch
        run: git checkout -b v${{ github.event.inputs.appVersion }}
      - name: Update extension/package.json version
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/package.json
          field: version
          value: ${{ github.event.inputs.appVersion }}
      - name: Update manifest v3 version
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/public/static/manifest/v3.json
          field: version
          value: ${{ github.event.inputs.appVersion }}
      - name: Update manifest v3 version_name
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/public/static/manifest/v3.json
          field: version_name
          value: ${{ github.event.inputs.appVersion }}
      - name: Commit and push version branch
        run: |
          git add -A
          git commit -m "v${{ github.event.inputs.appVersion }}"
          git push origin v${{ github.event.inputs.appVersion }}
      - name: Open PR against release branch
        run: |
          gh pr create \
            --base release/${{ github.event.inputs.appVersion }} \
            --head v${{ github.event.inputs.appVersion }} \
            --title "v${{ github.event.inputs.appVersion }}" \
            --body ""
        env:
          GH_TOKEN: ${{ github.token }}

      # Step 3: Bump-version branch + PR against master
      - name: Checkout master
        run: git checkout master
      - name: Create bump-version branch
        run: git checkout -b bump-version
      - name: Update extension/package.json version
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/package.json
          field: version
          value: ${{ github.event.inputs.appVersion }}
      - name: Update manifest v3 version
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/public/static/manifest/v3.json
          field: version
          value: ${{ github.event.inputs.appVersion }}
      - name: Update manifest v3 version_name
        uses: jossef/action-set-json-field@2a0f7d953b580b828717daf4de7fafc7e4135e97 #v2
        with:
          file: ./extension/public/static/manifest/v3.json
          field: version_name
          value: ${{ github.event.inputs.appVersion }}
      - name: Commit and force push bump-version branch
        run: |
          git add -A
          git commit -m "bump versions to ${{ github.event.inputs.appVersion }}"
          git push --force origin bump-version
      - name: Open PR against master
        run: |
          gh pr create \
            --base master \
            --head bump-version \
            --title "bump versions to ${{ github.event.inputs.appVersion }} [Merge Now]" \
            --body ""
        env:
          GH_TOKEN: ${{ github.token }}
