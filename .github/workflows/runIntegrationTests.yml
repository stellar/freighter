name: Run Integration Tests
env:
  INDEXER_URL: ${{ secrets.INDEXER_URL }}
  INDEXER_V2_URL: ${{ secrets.INDEXER_V2_BETA_URL }}
  IS_INTEGRATION_MODE: "true"
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: write
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  test-ci:
    name: test
    timeout-minutes: 45
    runs-on: macos-latest-xlarge
    steps:
      - name: Verify running from master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Error: This workflow must be run from the master branch."
          exit 1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: corepack enable
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: yarn
      - run: npx playwright install --with-deps chromium
      - run: yarn setup
      - run: yarn build:freighter-api
      - run: yarn build:extension
      - run: yarn test:ci
      - run: yarn test:e2e
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: extension/test-results/
          retention-days: 5
